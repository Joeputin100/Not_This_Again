name: Smoke Test (Emulator + Firebase Test Lab)

# Iter 100: automated on-device smoke test. Runs in parallel with
# android-debug.yml on every push. Catches script-attach / runtime
# failures that CI export doesn't (e.g., the iter 95-99 3D PREVIEW
# script-not-attaching bug, which would have been visible here as
# 'level_3d.gd _init' missing from logcat).
#
# Security note: this workflow does NOT consume any attacker-controllable
# github.event.* fields. The only github contexts used are secrets
# (GCP_WIF_PROVIDER, GCP_SERVICE_ACCOUNT) and workflow_dispatch inputs.
# GITHUB_REF_NAME (auto-injected branch name) is read into an env: var
# and only used inside double-quoted gcloud args, never in eval/sh -c.
#
# Pipeline:
#   build          → SMOKE_TEST=true variant that auto-loads
#                    level_3d.tscn 2s after main_menu boot. Converts
#                    AAB → universal APK via bundletool. Uploads as
#                    workflow artifact for the test jobs to consume.
#   emulator       → reactivecircus/android-emulator-runner@v2 on
#                    x86_64 API 33. Installs APK, launches activity,
#                    waits 30s, dumps logcat, asserts 'level_3d.gd _init'.
#   firebase-test  → gcloud firebase test android run --type=robo on a
#                    virtual Pixel (FTL free tier: 10 virtual + 5
#                    physical/day). Catches device-specific bugs the
#                    emulator misses.
#
# One-time setup outside CI:
#   - Service account ${GCP_SERVICE_ACCOUNT} needs role
#       roles/cloudtestservice.testAdmin   (run Firebase Test Lab tests)
#   - For deeper logcat assertion from FTL (phase-2), SA also needs
#     roles/storage.objectViewer on test-lab-${PROJECT_NUMBER}.appspot.com

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      skip_ftl:
        description: 'Skip Firebase Test Lab job (use only emulator)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  GODOT_VERSION: 4.6.1-stable
  GCP_PROJECT: static-webbing-461904-c4

jobs:
  build:
    name: Build smoke-test APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Stamp build_info.gd with SMOKE_TEST=true
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(git log -1 --format=%cs)
          ITER=$(git log --oneline | wc -l)
          cat > godot/scripts/build_info.gd <<GDEOF
          extends Object

          # Auto-generated by .github/workflows/smoke-test.yml.
          const SHA: String = "${SHA}"
          const SHORT_DATE: String = "${DATE}"
          const ITER: String = "${ITER}"
          const SMOKE_TEST: bool = true
          GDEOF
          echo "Stamped build_info.gd (SMOKE_TEST=true):"
          cat godot/scripts/build_info.gd

      - name: Install Godot Android build template into project
        run: |
          mkdir -p /tmp/godot-templates
          cd /tmp/godot-templates
          wget -nv "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" \
            -O templates.tpz
          unzip -j -o templates.tpz '*/android_source.zip' -d .
          mkdir -p "$GITHUB_WORKSPACE/godot/android/build"
          unzip -o android_source.zip -d "$GITHUB_WORKSPACE/godot/android/build/"
          # Godot's .build_version file uses '4.6.1.stable' format (with dot),
          # not '4.6.1-stable' (with dash). The dash form matches the release
          # download URL; the dot form matches what Godot writes when you
          # install the build template from the Project menu. Mismatch causes
          # "Android build version mismatch" at export time. Hardcoded here.
          echo "4.6.1.stable" > "$GITHUB_WORKSPACE/godot/android/.build_version"
          touch "$GITHUB_WORKSPACE/godot/android/build/.gdignore"

      - name: Patch Android template for Firebase Crashlytics
        run: |
          python3 scripts/patch_android_for_firebase.py \
            "$GITHUB_WORKSPACE/godot/android/build"

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch google-services.json from Secret Manager
        run: |
          gcloud secrets versions access latest \
            --secret=notthisagain-google-services \
            --project="${GCP_PROJECT}" \
            > "$GITHUB_WORKSPACE/godot/android/build/google-services.json"

      - name: Godot export (debug)
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_export_templates.tpz
          relative_project_path: ./godot
          archive_output: false
          presets_to_export: |
            Android
          export_debug: true
          cache: true
          use_preset_export_path: true

      - name: Convert AAB to universal APK via bundletool
        run: |
          AAB=$(find build -name "*.aab" | head -1)
          if [ -z "$AAB" ]; then echo "No AAB produced"; exit 1; fi
          echo "Found AAB: $AAB"
          BUNDLETOOL=/tmp/bundletool.jar
          wget -nv -O "$BUNDLETOOL" \
            https://github.com/google/bundletool/releases/download/1.18.0/bundletool-all-1.18.0.jar
          java -jar "$BUNDLETOOL" build-apks \
            --bundle="$AAB" \
            --output=/tmp/app.apks \
            --mode=universal
          unzip -p /tmp/app.apks universal.apk > app-smoke.apk
          ls -lh app-smoke.apk

      - name: Upload smoke-test APK
        uses: actions/upload-artifact@v4
        with:
          name: app-smoke-apk
          path: app-smoke.apk
          retention-days: 7
          if-no-files-found: error

  emulator:
    name: Emulator smoke test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download smoke-test APK
        uses: actions/download-artifact@v4
        with:
          name: app-smoke-apk
          path: ./

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api33-x86_64-v1

      - name: Create AVD + first-boot snapshot (cache miss only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching"

      - name: Run smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            set -e
            adb logcat -c
            echo "Installing APK..."
            adb install -r app-smoke.apk
            echo "Launching app..."
            adb shell am start -W -n app.notthisagain.run/com.godot.game.GodotApp
            echo "Waiting 30s for main_menu boot + auto-redirect to level_3d..."
            sleep 30
            echo "Dumping logcat..."
            adb logcat -d > /tmp/logcat.txt
            echo "===== filtered logcat ====="
            grep -E "godot|level_3d|main_menu|SMOKE|DebugLog" /tmp/logcat.txt | tail -120 || true
            echo "============================"
            if grep -q "level_3d.gd _init" /tmp/logcat.txt; then
              echo "PASS: level_3d.gd _init breadcrumb found — script attached."
            else
              echo "FAIL: level_3d.gd _init breadcrumb MISSING — script did not attach."
              echo "----- last 50 godot lines -----"
              grep -E "godot|GodotApp" /tmp/logcat.txt | tail -50 || true
              exit 1
            fi

      - name: Upload emulator logcat on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-logcat
          path: /tmp/logcat.txt
          retention-days: 14

  firebase-test:
    name: Firebase Test Lab smoke
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.skip_ftl != true }}
    timeout-minutes: 20
    env:
      BRANCH_NAME: ${{ github.ref_name }}
    steps:
      - name: Download smoke-test APK
        uses: actions/download-artifact@v4
        with:
          name: app-smoke-apk
          path: ./

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Sanitize branch name for FTL history label
        # Branch names may contain chars FTL rejects in --results-history-name.
        # Replace anything non-alphanumeric/dash with underscore. We use env:
        # to pass the branch name and never interpolate it into eval/sh -c.
        run: |
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | tr -cs '[:alnum:]-' '_')
          echo "FTL_HISTORY=smoke-test-${SAFE_BRANCH}" >> "$GITHUB_ENV"

      - name: Run Robo test on virtual device (FTL free tier)
        # --type=robo: FTL's automated UI explorer. SMOKE_TEST build
        # auto-redirects to level_3d.tscn 2s after launch, so robo's
        # only job is to keep the app alive long enough for breadcrumbs.
        # Virtual device 'MediumPhone.arm' is free-tier eligible (~$0
        # per run within daily quota of 10).
        run: |
          set -e
          gcloud firebase test android run \
            --type=robo \
            --app=app-smoke.apk \
            --device=model=MediumPhone.arm,version=33,locale=en,orientation=portrait \
            --timeout=90s \
            --no-record-video \
            --no-performance-metrics \
            --project="${GCP_PROJECT}" \
            --results-history-name="${FTL_HISTORY}" 2>&1 | tee /tmp/ftl_output.txt
          FTL_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "===== FTL exit code: $FTL_EXIT ====="
          if [ "$FTL_EXIT" -ne 0 ]; then
            echo "FAIL: FTL run returned non-zero exit (app crash or test infra failure)."
            exit 1
          fi
          grep -E "https://console\.firebase\.google\.com" /tmp/ftl_output.txt \
            || echo "(no console URL parsed — see raw output above)"
          echo "PASS: FTL Robo run completed without crashes."

      - name: Upload FTL output log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ftl-output
          path: /tmp/ftl_output.txt
          retention-days: 14

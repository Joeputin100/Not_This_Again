name: Android Release Build

# Tag-triggered. Pulls the release keystore from Google Secret Manager
# via Workload Identity Federation, signs the .aab, uploads as artifact.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for WIF OIDC token exchange

jobs:
  build:
    name: Build signed release .aab
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so build_info.gd can compute commit count

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Stamp build_info.gd with current commit SHA + date
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(git log -1 --format=%cs)  # YYYY-MM-DD
          ITER=$(git log --oneline | wc -l)
          cat > godot/scripts/build_info.gd <<GDEOF
          extends Object

          # Auto-generated by .github/workflows/*.yml — do not edit manually.
          # Stamped at build time with git SHA + commit date so the running
          # APK can display "which build is this" on the main menu.

          const SHA: String = "${SHA}"
          const SHORT_DATE: String = "${DATE}"
          const ITER: String = "${ITER}"
          GDEOF
          echo "Stamped build_info.gd:"
          cat godot/scripts/build_info.gd

      - name: Install Godot Android build template into project
        # See android-debug.yml for the rationale on this step.
        run: |
          mkdir -p /tmp/godot-templates
          cd /tmp/godot-templates
          wget -nv https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz \
            -O templates.tpz
          unzip -j -o templates.tpz '*/android_source.zip' -d .
          mkdir -p "$GITHUB_WORKSPACE/godot/android/build"
          unzip -o android_source.zip -d "$GITHUB_WORKSPACE/godot/android/build/"
          echo "4.6.1.stable" > "$GITHUB_WORKSPACE/godot/android/.build_version"
          touch "$GITHUB_WORKSPACE/godot/android/build/.gdignore"
          ls -la "$GITHUB_WORKSPACE/godot/android/" | head -10

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch release keystore from Secret Manager (binary-safe)
        # gcloud's stdout corrupts binary via Python's text-mode encoder
        # (every non-UTF-8 byte becomes EF BF BD). Use the JSON payload
        # path with URL-safe base64 decode instead. See docs/risks.md.
        run: |
          gcloud secrets versions access latest \
            --secret=android-release-keystore \
            --format='get(payload.data)' \
            | tr -d '\n' \
            | tr -- '-_' '+/' \
            | base64 -d > "$RUNNER_TEMP/release.p12"
          MAGIC=$(head -c 2 "$RUNNER_TEMP/release.p12" | od -An -tx1 | tr -d ' ')
          if [ "$MAGIC" != "3082" ]; then
            echo "::error::Keystore magic bytes wrong (got $MAGIC, expected 3082). Binary corruption?"
            exit 1
          fi
          echo "Keystore size: $(stat -c '%s' "$RUNNER_TEMP/release.p12") bytes"

      - name: Fetch google-services.json from Secret Manager
        # Plain JSON — no binary corruption risk. Must run AFTER the
        # Godot Android template unzip (which would overwrite the file).
        run: |
          gcloud secrets versions access latest \
            --secret=notthisagain-google-services \
            --project=static-webbing-461904-c4 \
            > "$GITHUB_WORKSPACE/godot/android/build/google-services.json"

      - name: Fetch keystore password from Secret Manager
        id: fetch_password
        run: |
          PW=$(gcloud secrets versions access latest --secret=android-keystore-password)
          echo "::add-mask::$PW"
          echo "keystore_password=$PW" >> "$GITHUB_OUTPUT"

      - name: Inject keystore values into export_presets.cfg
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.p12
          KEY_ALIAS: not_this_again_release
          KEYSTORE_PASSWORD: ${{ steps.fetch_password.outputs.keystore_password }}
        run: |
          python3 <<'PYEOF'
          import os
          path = 'godot/export_presets.cfg'
          with open(path, 'r') as f:
              data = f.read()
          replacements = [
              ('keystore/release=""',
               f'keystore/release="{os.environ["KEYSTORE_PATH"]}"'),
              ('keystore/release_user=""',
               f'keystore/release_user="{os.environ["KEY_ALIAS"]}"'),
              ('keystore/release_password=""',
               f'keystore/release_password="{os.environ["KEYSTORE_PASSWORD"]}"'),
          ]
          for needle, replacement in replacements:
              if needle not in data:
                  raise SystemExit(f"FATAL: expected substring not found: {needle!r}")
              data = data.replace(needle, replacement, 1)
          with open(path, "w") as f:
              f.write(data)
          PYEOF

      - name: Godot export (release)
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          relative_project_path: ./godot
          archive_output: false
          presets_to_export: |
            Android
          export_debug: false
          cache: true
          use_preset_export_path: true

      - name: Wipe credentials from workspace
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/release.p12"
          git checkout -- godot/export_presets.cfg 2>/dev/null || true

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/**/*.aab
          retention-days: 90
          if-no-files-found: error

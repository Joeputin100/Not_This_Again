name: Android Debug Build

# Runs on every push and PR. Produces a debug-signed .aab for sideloading.
# Debug builds use Godot's auto-generated debug keystore — no GCP auth needed.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug .aab
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so build_info.gd can compute commit count

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Stamp build_info.gd with current commit SHA + date
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(git log -1 --format=%cs)  # YYYY-MM-DD
          ITER=$(git log --oneline | wc -l)
          cat > godot/scripts/build_info.gd <<GDEOF
          extends Object

          # Auto-generated by .github/workflows/*.yml — do not edit manually.
          # Stamped at build time with git SHA + commit date so the running
          # APK can display "which build is this" on the main menu.

          const SHA: String = "${SHA}"
          const SHORT_DATE: String = "${DATE}"
          const ITER: String = "${ITER}"
          GDEOF
          echo "Stamped build_info.gd:"
          cat godot/scripts/build_info.gd

      - name: Install Godot Android build template into project
        # The custom Android build template (gradle source) ships inside
        # Godot's export templates archive as android_source.zip. Extract
        # it into godot/android/build/ so use_gradle_build=true can produce
        # AAB without needing the Godot Editor's "Install Android Build
        # Template" menu (which has no CLI equivalent in 4.6.1).
        #
        # The Editor's install also writes two marker files in DIFFERENT
        # directories (confirmed against Godot 4.6.1 source at
        # editor/export/export_template_manager.cpp::install_android_template_from_file):
        #   - .build_version goes in android/ (PARENT of build/, used for version check)
        #   - .gdignore goes in android/build/ (INSIDE build/, prevents Godot's
        #     resource scanner from importing gradle source as project assets)
        run: |
          mkdir -p /tmp/godot-templates
          cd /tmp/godot-templates
          wget -nv https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz \
            -O templates.tpz
          unzip -j -o templates.tpz '*/android_source.zip' -d .
          mkdir -p "$GITHUB_WORKSPACE/godot/android/build"
          unzip -o android_source.zip -d "$GITHUB_WORKSPACE/godot/android/build/"
          echo "4.6.1.stable" > "$GITHUB_WORKSPACE/godot/android/.build_version"
          touch "$GITHUB_WORKSPACE/godot/android/build/.gdignore"
          ls -la "$GITHUB_WORKSPACE/godot/android/" | head -10

      - name: Godot export (debug)
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          relative_project_path: ./godot
          archive_output: false
          presets_to_export: |
            Android
          export_debug: true
          cache: true
          use_preset_export_path: true

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-aab
          path: build/**/*.aab
          retention-days: 14
          if-no-files-found: error

name: Android Debug Build

# Runs on every push and PR. Produces a debug-signed .aab for sideloading.
# Debug builds use Godot's auto-generated debug keystore — no GCP auth needed.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug .aab
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Godot Android build template into project
        # The custom Android build template (gradle source) ships inside
        # Godot's export templates archive as android_source.zip. Extract
        # it into android/build/ so use_gradle_build=true can produce AAB
        # without needing the Godot Editor's "Install Android Build
        # Template" menu (which has no CLI equivalent in 4.6.1).
        run: |
          mkdir -p /tmp/godot-templates
          cd /tmp/godot-templates
          wget -nv https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz \
            -O templates.tpz
          unzip -j -o templates.tpz '*/android_source.zip' -d .
          mkdir -p "$GITHUB_WORKSPACE/godot/android/build"
          unzip -o android_source.zip -d "$GITHUB_WORKSPACE/godot/android/build/"
          echo "Installed template files:"
          ls "$GITHUB_WORKSPACE/godot/android/build/" | head -20

      - name: Godot export (debug)
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          relative_project_path: ./godot
          archive_output: false
          presets_to_export: |
            Android
          export_debug: true
          cache: true
          use_preset_export_path: true

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-aab
          path: build/**/*.aab
          retention-days: 14
          if-no-files-found: error

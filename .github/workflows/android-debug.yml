name: Android Debug Build

# Runs on every push and PR. Produces a debug-signed .aab for sideloading.
# Debug builds use Godot's auto-generated debug keystore — no GCP auth needed.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug .aab
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Godot Android build template into project
        # The custom Android build template (gradle source) ships inside
        # Godot's export templates archive as android_source.zip. Extract
        # it into android/build/ so use_gradle_build=true can produce AAB
        # without needing the Godot Editor's "Install Android Build
        # Template" menu (which has no CLI equivalent in 4.6.1).
        run: |
          mkdir -p /tmp/godot-templates
          cd /tmp/godot-templates
          wget -nv https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz \
            -O templates.tpz
          unzip -j -o templates.tpz '*/android_source.zip' -d .
          mkdir -p "$GITHUB_WORKSPACE/godot/android/build"
          unzip -o android_source.zip -d "$GITHUB_WORKSPACE/godot/android/build/"
          # Mimic what the Editor's "Install Android Build Template" menu writes
          # after extraction. The two marker files live in DIFFERENT directories
          # (confirmed against Godot 4.6.1 source at
          # editor/export/export_template_manager.cpp install_android_template_from_file):
          #   - .build_version goes in android/   (PARENT of build/, used for version check)
          #   - .gdignore     goes in android/build/  (INSIDE build/, prevents Godot's
          #                                            resource scanner from importing
          #                                            gradle source as project assets)
          echo "4.6.1.stable" > "$GITHUB_WORKSPACE/godot/android/.build_version"
          touch "$GITHUB_WORKSPACE/godot/android/build/.gdignore"
          echo "Installed template files (godot/android/):"
          ls -la "$GITHUB_WORKSPACE/godot/android/" | head -10
          # Patch the extracted AndroidManifest.xml to enable predictive back
          # gesture (required for targetSdk 33+ predictive animations on
          # Android 14+). Godot's runtime already bridges OnBackInvokedCallback
          # to NOTIFICATION_WM_GO_BACK_REQUEST internally.
          python3 <<'PYEOF'
          import os
          path = os.path.join(os.environ["GITHUB_WORKSPACE"], "godot/android/build/app/src/main/AndroidManifest.xml")
          with open(path) as f:
              data = f.read()
          NEEDLE = 'tools:ignore="GoogleAppIndexingWarning"'
          NEW = 'android:enableOnBackInvokedCallback="true"\n        tools:ignore="GoogleAppIndexingWarning"'
          if "android:enableOnBackInvokedCallback" not in data:
              if NEEDLE not in data:
                  raise SystemExit("FATAL: anchor 'tools:ignore' not found in manifest")
              data = data.replace(NEEDLE, NEW, 1)
              with open(path, "w") as f:
                  f.write(data)
              print("Patched manifest: added android:enableOnBackInvokedCallback")
          else:
              print("Manifest already has enableOnBackInvokedCallback (unexpected for fresh extract)")
          PYEOF

      - name: Godot export (debug)
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          relative_project_path: ./godot
          archive_output: false
          presets_to_export: |
            Android
          export_debug: true
          cache: true
          use_preset_export_path: true

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-aab
          path: build/**/*.aab
          retention-days: 14
          if-no-files-found: error

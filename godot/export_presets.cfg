[preset.0]

name="Android"
platform="Android"
runnable=true
advanced_options=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="../build/release.aab"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""

; AAB output requires the custom Android build template at ../android/build/
; (gradle source files). The CI workflows extract this from
; android_source.zip inside the export templates archive on every run
; (see .github/workflows/*.yml "Install Godot Android build template
; into project" step). No commit of template files needed.
gradle_build/use_gradle_build=true
gradle_build/gradle_build_directory=""
gradle_build/android_source_template=""
gradle_build/compress_native_libraries=false
gradle_build/export_format=1
gradle_build/min_sdk="24"
gradle_build/target_sdk="36"
architectures/armeabi-v7a=false
architectures/arm64-v8a=true
architectures/x86=false
architectures/x86_64=false
version/code=1
version/name="0.0.1"
package/unique_name="app.notthisagain.run"
package/name="Not This Again"
package/signed=true
package/app_category=2
package/retain_data_on_uninstall=false
package/exclude_from_recents=false
package/show_in_android_tv=false
package/show_in_app_library=true
package/show_as_launcher_app=true
launcher_icons/main_192x192=""
launcher_icons/adaptive_foreground_432x432=""
launcher_icons/adaptive_background_432x432=""
launcher_icons/adaptive_monochrome_432x432=""
graphics/opengl_debug=false
xr_features/xr_mode=0
screen/immersive_mode=true
screen/edge_to_edge=true
screen/support_small=true
screen/support_normal=true
screen/support_large=true
screen/support_xlarge=true
user_data_backup/allow=false
command_line/extra_args=""
apk_expansion/enable=false
apk_expansion/SALT=""
apk_expansion/public_key=""
permissions/custom_permissions=PackedStringArray()
permissions/internet=true
permissions/access_network_state=true

keystore/debug=""
keystore/debug_user=""
keystore/debug_password=""

; Release keystore fields are empty in source; populated at build time
; by .github/workflows/android-release.yml (which substitutes the empty
; values for the actual keystore path / alias / password pulled from
; Google Secret Manager). Debug builds never need a release keystore,
; so keeping these empty avoids Godot's pre-export validation rejecting
; placeholder strings.
keystore/release=""
keystore/release_user=""
keystore/release_password=""

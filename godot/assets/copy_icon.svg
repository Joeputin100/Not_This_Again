  <line x1="18" y1="22" x2="38" y2="22" stroke="#5c3d1c" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="30" x2="38" y2="30" stroke="#5c3d1c" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="38" x2="32" y2="38" stroke="#5c3d1c" stroke-width="2" stroke-linecap="round"/>
</svg>
